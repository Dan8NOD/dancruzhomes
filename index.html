<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dan Cruz Homes — custom home builder specializing in large minimalist builds and adaptive reuse in Chicago.">
  <meta property="og:image" content="https://dancruzhomes.com/logo.png">
  <title>Dan Cruz Homes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    h1 { font-size: 3rem; margin-bottom: 1rem; font-weight: 300; letter-spacing: -0.02em; }
    .subtitle { color: #888; margin-bottom: 4rem; font-size: 1.1rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; max-width: 800px; width: 100%; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 2rem; text-decoration: none; color: inherit; transition: all 0.2s; }
    .card:hover { border-color: #666; transform: translateY(-4px); }
    .card h2 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 500; }
    .card p { color: #aaa; line-height: 1.6; }
    
  </style>
</head>
<body>
  <h1>Dan Cruz Homes</h1>
  <p class="subtitle">Minimalist living, maximum life.</p>
  <div class="cards">
        <div class="card">
      <h2>Approach</h2>
      <p>Every home is a negotiation between space and soul.</p>
    </div>
    <div class="card">
      <h2>Portfolio</h2>
      <p>Coming soon.</p>
    </div>
  </div>
  <footer style="text-align:center;color:#555;padding:2rem 1rem 3rem;font-size:0.85rem">&copy; 2026 FatCat Asset Management</footer>
</body>
</html>
